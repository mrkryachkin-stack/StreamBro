name: CI — Tests & Lint

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm test

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=❌ <b>StreamBro CI Failed</b>%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}" \
            -d "parse_mode=HTML"

  deploy-staging:
    name: Deploy to Staging
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 120s
          script: |
            cd /opt/deploy && git pull origin develop --rebase || true
            cd /opt/server-staging && git pull origin develop || (git clone https://github.com/mrkryachkin-stack/StreamBro.git /opt/server-staging && cd /opt/server-staging)
            cd /opt/server-staging
            docker compose -f server/docker-compose.staging.yml build backend-staging
            docker compose -f server/docker-compose.staging.yml up -d
            echo "Staging deployed!"

      - name: Notify Telegram on staging deploy
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=✅ <b>StreamBro Staging Deployed</b>%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}" \
            -d "parse_mode=HTML"
