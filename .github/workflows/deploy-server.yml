name: Deploy Server

on:
  push:
    branches: [master, main]
    paths:
      - 'server/**'

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy server files via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: REDACTED_VPS_IP
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # Copy updated files from git
            cd /tmp
            rm -rf streambro-deploy
            git clone --depth 1 https://github.com/mrkryachkin-stack/StreamBro.git streambro-deploy
            
            # Copy server source files
            cp -r streambro-deploy/server/src/* /opt/server/src/
            cp streambro-deploy/server/prisma/schema.prisma /opt/server/prisma/
            
            # Rebuild and restart
            cd /opt/deploy
            docker compose build backend
            docker compose up -d backend
            
            # Verify
            sleep 5
            curl -s https://streambro.ru/api/health

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=${EMOJI} <b>StreamBro Server Deploy: ${STATUS}</b>%0ABranch: ${{ github.ref_name }}" \
            -d "parse_mode=HTML"
