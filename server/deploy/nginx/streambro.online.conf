# ─── streambro.online → redirect to streambro.ru ─────────────

# HTTP → HTTPS + redirect
server {
    listen 80;
    server_name streambro.online www.streambro.online;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://streambro.ru$request_uri;
    }
}

# HTTPS → redirect to streambro.ru
server {
    listen 443 ssl http2;
    server_name streambro.online www.streambro.online;

    # SSL — separate cert for .online domain
    ssl_certificate     /etc/letsencrypt/live/streambro.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/streambro.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Redirect everything to .ru domain
    location / {
        return 301 https://streambro.ru$request_uri;
    }
}
