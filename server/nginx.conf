# ─── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    server_name streambro.ru www.streambro.ru;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://streambro.ru$request_uri;
    }
}

# ─── HTTPS — main site ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name streambro.ru www.streambro.ru;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/streambro.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/streambro.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header X-Content-Type-Options  nosniff   always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # Frontend (Next.js)
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Auth endpoints (stricter rate limit)
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Signaling (WebSocket for P2P)
    location /signaling {
        proxy_pass         http://signaling:7890;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;
    }

    # Static assets (cache)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff2?|ttf|eot|css|js)$ {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
